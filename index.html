<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<link rel="icon" href="img/icon.png" type="image/png">
<link rel="stylesheet" href="css/style.css">
<script type="text/javascript" src="js/jquery-1.8.2.min.js"></script>
<script type="text/javascript" src="js/main.js"></script>
<style>
	.fade-slider {
		width: 100%;
		height: 80vh;
		position: relative;
		overflow: hidden;
	
		/* Centrer le cadre dans l’écran */
		display: flex;
		justify-content: center;
		align-items: center;
	}

	/* Le conteneur du cadre */
	.frame {
		background: #222;        /* cadre gris fonçé */
		padding: 25px;           /* épaisseur du cadre noir */
		border: 2px solid #333;  /* bordure grise */
		box-sizing: content-box;
		display: inline-block;
	
		/* Position dans le slider */
		position: absolute;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);
	}

	/* Les images */
	.frame img {
		max-width: 100%;
		max-height: 80vh;
		object-fit: contain;
		display: block;
	}

	/* Effet fade */
	.frame {
		opacity: 0;
		transition: opacity 1.5s ease-in-out;
	}

	.frame.active {
		opacity: 1;
	}
</style>
</head>

<body>

<div id="header"><script>header();</script></div>

<div class="fade-slider">
	<div class="frame active"><img src="img/presentation/2012-11-08(044).jpg"></div>
	<div class="frame"><img src="img/presentation/2026-03-18(001).jpg"></div>
	<div class="frame"><img src="img/presentation/2009-04-21(019).jpg"></div>
	<div class="frame"><img src="img/presentation/2013-07-03(003).jpg"></div>
	<div class="frame"><img src="img/presentation/2009-09-11(057).jpg"></div>
	<div class="frame"><img src="img/presentation/2013-07-23(013).jpg"></div>
	<div class="frame"><img src="img/presentation/2012-07-14(014).jpg"></div>
	<div class="frame"><img src="img/presentation/2024-09-12(011).jpg"></div>
	<div class="frame"><img src="img/presentation/2013-07-12(059).jpg"></div>
	<div class="frame"><img src="img/presentation/2013-07-04(037)_1.jpg"></div>
	<div class="frame"><img src="img/presentation/2013-04-17(062).jpg"></div>
	<div class="frame"><img src="img/presentation/2014-02-01(061).jpg"></div>
	<div class="frame"><img src="img/presentation/2022-09-11(051).jpg"></div>
	<div class="frame"><img src="img/presentation/2025-02-28(001).jpg"></div>
</div>

<script>
	const frames = document.querySelectorAll('.frame');
	let index = 0;

	function next() {
		frames[index].classList.remove('active');
		index = (index + 1) % frames.length;
		frames[index].classList.add('active');
	}

	setInterval(next, 5000);
</script>

</body></html>
